<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Anant Bangar Portfolio</title>
  <link rel="shortcut icon" href="portfolio-icon.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="contact-form">
        <h2>Let's Connect!</h2>
            <label for="name">Name:</label>
            <input type="text" placeholder="Enter your name here..." id="name" name="name" required >
            <br>
            <br>
            <label for="email">Email:</label>
            <input type="email" placeholder="Enter your email here..." id="email" name="email" required>
            <br>
            <br>
            <p>Topic of interest:</p>
            <div id="checkbox">
                <label for="HTML">HTML</label>
                <input type="checkbox" id="HTML" name="interest-topic" value="HTML">
                <label for="CSS">CSS</label>
                <input type="checkbox" id="CSS" name="interest-topic" value="CSS">
                <label for="JavaScript">JavaScript</label>
                <input type="checkbox" id="JavaScript" name="interest-topic" value="JavaScript">
            </div>
            <br>
            <label for="message">Message:</label>
            <br>
            <textarea id="message" placeholder="Enter your message here..." name="message" rows="8" cols="60" required></textarea>
            <br>
            <input type="submit" value="Submit" name="Submit" id="button">
    </form>
</body>
